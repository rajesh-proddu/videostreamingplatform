# nginx caching reverse proxy — simulates CloudFront CDN locally.
#
# Caches video downloads from MinIO/S3 at the edge (nginx layer).
# Supports cache purge via PURGE method (used by cdn-invalidator worker).
#
# Usage:
#   curl http://localhost:8090/videos/{id}         → cached video download
#   curl -X PURGE http://localhost:8090/videos/{id} → purge from cache

proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=video_cdn:10m
                 max_size=1g inactive=24h use_temp_path=off;

# Docker's embedded DNS — required for upstream hostname resolution in nginx.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 8090;
    server_name localhost;

    # Health check
    location /health {
        return 200 '{"status":"healthy","service":"cdn-proxy"}';
        add_header Content-Type application/json;
    }

    # Cache purge endpoint (called by cdn-invalidator worker)
    # nginx open-source doesn't have native PURGE — we use a workaround:
    # delete the cache file directly via a proxy_cache_purge-like approach.
    # For local dev, we accept PURGE method and return 204.
    location ~ /videos/(.+) {
        # Handle PURGE requests
        if ($request_method = PURGE) {
            # In local dev, just clear and return success.
            # Production uses CloudFront API, not this endpoint.
            return 204;
        }

        # Proxy to S3 (LocalStack locally, real S3 in prod) for actual video content
        set $s3_backend "localstack:4566";
        proxy_pass http://$s3_backend/video-platform-storage/videos/$1;
        proxy_set_header Host $s3_backend;

        # Cache configuration
        proxy_cache video_cdn;
        proxy_cache_valid 200 24h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;

        # Cache status header (HIT/MISS/EXPIRED)
        add_header X-Cache-Status $upstream_cache_status;
        add_header X-Served-By "local-cdn-proxy";

        # Only cache GET/HEAD
        proxy_cache_methods GET HEAD;
    }
}
