# Analytics ConfigMap — REST catalog + MinIO for local Iceberg
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-config
  namespace: analytics
data:
  KAFKA_BROKERS: kafka.infra.svc.cluster.local:9092
  KAFKA_WATCH_TOPIC: watch-events
  ICEBERG_CATALOG_NAME: local
  ICEBERG_CATALOG_TYPE: rest
  ICEBERG_REST_URI: http://iceberg-rest-catalog.infra.svc.cluster.local:8181
  ICEBERG_WAREHOUSE: "s3://iceberg-warehouse/"
  ICEBERG_TABLE: analytics.watch_history
  AWS_REGION: us-east-1
  S3_ENDPOINT: http://minio.videostreamingplatform.svc.cluster.local:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
---
# catalog-init Job — creates Iceberg namespace + table via catalog-admin
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-init
  namespace: analytics
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-rest-catalog
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Iceberg REST catalog..."
              until wget -qO- http://iceberg-rest-catalog.infra.svc.cluster.local:8181/v1/config 2>/dev/null; do
                echo "REST catalog not ready, retrying in 5s..."
                sleep 5
              done
              echo "REST catalog is ready"
      containers:
        - name: catalog-admin
          image: videostreamingplatform/catalog-admin:latest
          imagePullPolicy: Never
          args: ["create-tables"]
          envFrom:
            - configMapRef:
                name: analytics-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
# watch-history-consumer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watch-history-consumer
  namespace: analytics
  labels:
    app: watch-history-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watch-history-consumer
  template:
    metadata:
      labels:
        app: watch-history-consumer
    spec:
      containers:
        - name: consumer
          image: videostreamingplatform/watch-history-consumer:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: analytics-config
          env:
            - name: KAFKA_GROUP_ID
              value: watch-history-consumer
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
# Compaction CronJob — rewrites small files weekly
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-compaction
  namespace: analytics
spec:
  schedule: "0 3 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: catalog-admin
              image: videostreamingplatform/catalog-admin:latest
              imagePullPolicy: Never
              args: ["compact", "analytics.watch_history"]
              envFrom:
                - configMapRef:
                    name: analytics-config
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
---
# Snapshot expiry CronJob — prunes old snapshots daily
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-expire-snapshots
  namespace: analytics
spec:
  schedule: "0 4 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: catalog-admin
              image: videostreamingplatform/catalog-admin:latest
              imagePullPolicy: Never
              args: ["expire-snapshots", "analytics.watch_history"]
              envFrom:
                - configMapRef:
                    name: analytics-config
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
