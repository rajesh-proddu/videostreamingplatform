apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: videostreamingplatform
  labels:
    app: user-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: videostreamingplatform/userservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: HTTP_PORT
              value: "8082"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: jwt-signing-secret
            # Payment: mock provider for local (no external account).
            - name: PAYMENT_PROVIDER
              value: "mock"
            - name: PUBLIC_BASE_URL
              value: "http://localhost:30082"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
