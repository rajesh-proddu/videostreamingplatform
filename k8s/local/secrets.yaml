apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: videostreamingplatform
type: Opaque
stringData:
  password: videopass
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: videostreamingplatform
type: Opaque
stringData:
  # Shared HS256 secret: userservice issues tokens, dataservice verifies them.
  jwt-signing-secret: dev-shared-jwt-secret
