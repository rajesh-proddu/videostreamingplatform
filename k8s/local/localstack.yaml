# Iceberg REST Catalog — backed by MinIO (already deployed) for local Iceberg development
# Uses tabulario/iceberg-rest which is the reference REST catalog implementation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest-catalog
  namespace: infra
  labels:
    app: iceberg-rest-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest-catalog
  template:
    metadata:
      labels:
        app: iceberg-rest-catalog
    spec:
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:latest
          ports:
            - containerPort: 8181
          env:
            - name: CATALOG_WAREHOUSE
              value: "s3://iceberg-warehouse/"
            - name: CATALOG_IO__IMPL
              value: "org.apache.iceberg.aws.s3.S3FileIO"
            - name: CATALOG_S3_ENDPOINT
              value: "http://minio.videostreamingplatform.svc.cluster.local:9000"
            - name: CATALOG_S3_ACCESS__KEY__ID
              value: "minioadmin"
            - name: CATALOG_S3_SECRET__ACCESS__KEY
              value: "minioadmin"
            - name: CATALOG_S3_PATH__STYLE__ACCESS
              value: "true"
            - name: CATALOG_S3_REGION
              value: "us-east-1"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin"
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/config
              port: 8181
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest-catalog
  namespace: infra
spec:
  selector:
    app: iceberg-rest-catalog
  ports:
    - port: 8181
      targetPort: 8181
---
# Init Job — creates the iceberg-warehouse bucket in MinIO
apiVersion: batch/v1
kind: Job
metadata:
  name: iceberg-minio-init
  namespace: infra
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO..."
              until wget -qO- http://minio.videostreamingplatform.svc.cluster.local:9000/minio/health/live 2>/dev/null; do
                echo "MinIO not ready, retrying in 3s..."
                sleep 3
              done
              echo "MinIO is ready"
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mc alias set localminio http://minio.videostreamingplatform.svc.cluster.local:9000 minioadmin minioadmin
              mc mb localminio/iceberg-warehouse --ignore-existing
              echo "Bucket iceberg-warehouse created (or already exists)"
              mc ls localminio/
