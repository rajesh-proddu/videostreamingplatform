apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: videostreamingplatform
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS videos (
      id VARCHAR(36) PRIMARY KEY,
      title VARCHAR(255) NOT NULL,
      description TEXT,
      duration INT NOT NULL,
      size_bytes BIGINT NOT NULL,
      upload_status ENUM('PENDING', 'UPLOADING', 'COMPLETED', 'FAILED') DEFAULT 'PENDING',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      INDEX idx_created_at (created_at),
      INDEX idx_status (upload_status)
    );

    CREATE TABLE IF NOT EXISTS uploads (
      id VARCHAR(64) PRIMARY KEY,
      video_id VARCHAR(36) NOT NULL,
      user_id VARCHAR(36) NOT NULL,
      total_size BIGINT NOT NULL DEFAULT 0,
      uploaded_size BIGINT NOT NULL DEFAULT 0,
      uploaded_chunks INT NOT NULL DEFAULT 0,
      total_chunks INT NOT NULL DEFAULT 0,
      status ENUM('PENDING', 'INITIATED', 'IN_PROGRESS', 'COMPLETED', 'FAILED') DEFAULT 'PENDING',
      percentage DOUBLE NOT NULL DEFAULT 0,
      speed_mbps DOUBLE NULL,
      estimated_seconds BIGINT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      completed_at TIMESTAMP NULL,
      FOREIGN KEY (video_id) REFERENCES videos(id) ON DELETE CASCADE,
      INDEX idx_user_id (user_id),
      INDEX idx_status (status)
    );

    CREATE TABLE IF NOT EXISTS downloads (
      id VARCHAR(36) PRIMARY KEY,
      video_id VARCHAR(36) NOT NULL,
      user_id VARCHAR(36) NOT NULL,
      started_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      completed_at TIMESTAMP NULL,
      status ENUM('INITIATED', 'IN_PROGRESS', 'COMPLETED', 'FAILED') DEFAULT 'INITIATED',
      FOREIGN KEY (video_id) REFERENCES videos(id) ON DELETE CASCADE,
      INDEX idx_user_id (user_id),
      INDEX idx_video_id (video_id)
    );

    CREATE TABLE IF NOT EXISTS users (
      id VARCHAR(36) PRIMARY KEY,
      username VARCHAR(255) UNIQUE NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      INDEX idx_username (username)
    );
