apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: videostreamingplatform
data:
  MYSQL_HOST: mysql.videostreamingplatform.svc.cluster.local
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: videoplatform
  MYSQL_USER: videouser

  # S3/MinIO configuration
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: http://minio.videostreamingplatform.svc.cluster.local:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET: video-platform-storage

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: jaeger.observability.svc.cluster.local:4318

  # Kafka
  KAFKA_BROKERS: kafka.infra.svc.cluster.local:9092
  KAFKA_VIDEO_TOPIC: video-events
  KAFKA_WATCH_TOPIC: watch-events

  # Redis cache
  REDIS_ADDR: redis.videostreamingplatform.svc.cluster.local:6379
  CACHE_TTL_GET_VIDEO: "300"
  CACHE_TTL_LIST_VIDEOS: "60"

  # Rate limiting
  RATE_LIMIT_PER_MIN: "100"
  RATE_LIMIT_BURST: "150"

  # MySQL
  MYSQL_MAX_CONN: "50"

  # Elasticsearch
  ELASTICSEARCH_URL: http://elasticsearch.videostreamingplatform.svc.cluster.local:9200

  # Dataservice
  UPLOAD_STORE: mysql

  # Recommendation service (empty = disabled)
  RECOMMENDATION_SERVICE_URL: http://recommendations.recommendations.svc.cluster.local:8000
