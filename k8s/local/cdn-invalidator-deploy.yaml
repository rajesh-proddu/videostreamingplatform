apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdn-invalidator
  namespace: videostreamingplatform
  labels:
    app: cdn-invalidator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdn-invalidator
  template:
    metadata:
      labels:
        app: cdn-invalidator
    spec:
      containers:
        - name: cdn-invalidator
          image: videostreamingplatform/cdn-invalidator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-credentials
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
