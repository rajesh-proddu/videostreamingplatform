            "overrides": []
          },
          "targets": [
            {
              "expr": "go_memstats_heap_inuse_bytes{job=\"metadata-service\"}",
              "legendFormat": "metadata-service heap inuse",
              "refId": "A"
            },
            {
              "expr": "go_memstats_heap_inuse_bytes{job=\"data-service\"}",
              "legendFormat": "data-service heap inuse",
              "refId": "B"
            }
          ]
        },
        {
          "title": "Heap Allocated vs System",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "go_memstats_heap_alloc_bytes{job=\"metadata-service\"}",
              "legendFormat": "metadata alloc",
              "refId": "A"
            },
            {
              "expr": "go_memstats_heap_sys_bytes{job=\"metadata-service\"}",
              "legendFormat": "metadata sys",
              "refId": "B"
            },
            {
              "expr": "go_memstats_heap_alloc_bytes{job=\"data-service\"}",
              "legendFormat": "data alloc",
              "refId": "C"
            },
            {
              "expr": "go_memstats_heap_sys_bytes{job=\"data-service\"}",
              "legendFormat": "data sys",
              "refId": "D"
            }
          ]
        },
        {
          "title": "GC Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
