            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "go_memstats_stack_inuse_bytes{job=\"metadata-service\"}",
              "legendFormat": "metadata-service",
              "refId": "A"
            },
            {
              "expr": "go_memstats_stack_inuse_bytes{job=\"data-service\"}",
              "legendFormat": "data-service",
              "refId": "B"
            }
          ]
        },
        {
          "title": "OS Threads",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "go_threads{job=\"metadata-service\"}",
              "legendFormat": "metadata-service",
              "refId": "A"
