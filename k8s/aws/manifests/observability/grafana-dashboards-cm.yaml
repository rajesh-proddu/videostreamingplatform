            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "go_memstats_heap_objects{job=\"metadata-service\"}",
              "legendFormat": "metadata-service",
              "refId": "A"
            },
            {
              "expr": "go_memstats_heap_objects{job=\"data-service\"}",
              "legendFormat": "data-service",
              "refId": "B"
