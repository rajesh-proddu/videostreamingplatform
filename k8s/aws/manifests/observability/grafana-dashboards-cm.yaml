apiVersion: v1
data:
  go-runtime.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Goroutines",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 15, "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "go_goroutines{job=\"metadata-service\"}",
              "legendFormat": "metadata-service",
              "refId": "A"
            },
            {
              "expr": "go_goroutines{job=\"data-service\"}",
              "legendFormat": "data-service",
              "refId": "B"
            }
          ]
        },
        {
          "title": "Heap Memory In Use",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 15, "lineWidth": 2 },
