            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(go_memstats_alloc_bytes_total{job=\"metadata-service\"}[5m])",
              "legendFormat": "metadata-service",
              "refId": "A"
            },
            {
              "expr": "rate(go_memstats_alloc_bytes_total{job=\"data-service\"}[5m])",
              "legendFormat": "data-service",
              "refId": "B"
            }
          ]
        },
        {
          "title": "Stack Memory",
          "type": "timeseries",
