apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-service
  namespace: videostreamingplatform
  annotations:
    eks.amazonaws.com/role-arn: ${IRSA_DATA_ROLE_ARN}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: videostreamingplatform
  labels:
    app: data-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      serviceAccountName: data-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - data-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: data-service
          image: ghcr.io/rajesh-proddu/videostreamingplatform/data-service:latest
          imagePullPolicy: Always
          ports:
            - name: http2
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: HTTP_PORT
              value: "8081"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "jaeger.observability.svc.cluster.local:4318"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http2
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http2
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
