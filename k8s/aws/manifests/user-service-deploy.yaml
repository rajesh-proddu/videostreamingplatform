apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: videostreamingplatform
  labels:
    app: user-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/rajesh-proddu/videostreamingplatform/userservice:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: HTTP_PORT
              value: "8082"
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: host
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: password
            - name: JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: jwt-signing-secret
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "jaeger.observability.svc.cluster.local:4318"
            # Kafka producer for subscription lifecycle events (notifications).
            # Without KAFKA_BROKERS the producer is disabled (no-op).
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKERS
            - name: KAFKA_SUBSCRIPTION_TOPIC
              value: "subscription-events"
            # Payment provider. Switch to "razorpay" and supply razorpay-credentials
            # (key id/secret/webhook secret) to take real test-mode payments.
            - name: PAYMENT_PROVIDER
              value: "mock"
            - name: PUBLIC_BASE_URL
              value: "http://user-service.videostreamingplatform.svc.cluster.local:8082"
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: razorpay-credentials
                  key: key-id
                  optional: true
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: razorpay-credentials
                  key: key-secret
                  optional: true
            - name: RAZORPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: razorpay-credentials
                  key: webhook-secret
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
