apiVersion: v1
kind: ServiceAccount
metadata:
  name: metadata-service
  namespace: videostreamingplatform
  {{- if .Values.metadataService.irsa.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.metadataService.irsa.roleArn }}
  {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-service
  namespace: videostreamingplatform
  labels:
    app: metadata-service
    {{- include "vsp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.metadataService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: metadata-service
  template:
    metadata:
      labels:
        app: metadata-service
    spec:
      serviceAccountName: metadata-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - metadata-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: metadata-service
          image: {{ .Values.image.registry }}/metadata-service:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.metadataService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: host
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: password
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.jaeger.endpoint | quote }}
          resources:
            {{- toYaml .Values.metadataService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: metadata-service
  namespace: videostreamingplatform
  labels:
    app: metadata-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: metadata-service
  ports:
    - name: http
      port: {{ .Values.metadataService.port }}
      targetPort: {{ .Values.metadataService.port }}
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: metadata-service
  namespace: videostreamingplatform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: metadata-service
  minReplicas: {{ .Values.metadataService.hpa.minReplicas }}
  maxReplicas: {{ .Values.metadataService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.metadataService.hpa.cpuTarget }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.metadataService.hpa.memoryTarget }}
