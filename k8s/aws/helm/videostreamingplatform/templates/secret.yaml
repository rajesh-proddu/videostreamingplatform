{{/*
  rds-credentials secret is managed externally (kubectl / Sealed Secrets / External Secrets).
  ArgoCD ignores diffs on this resource via ignoreDifferences in the Application spec.

  To create manually:
    kubectl create secret generic rds-credentials \
      --namespace videostreamingplatform \
      --from-literal=host=<RDS_ENDPOINT> \
      --from-literal=username=admin \
      --from-literal=password=<PASSWORD> \
      --from-literal=database=videoplatform
*/}}
