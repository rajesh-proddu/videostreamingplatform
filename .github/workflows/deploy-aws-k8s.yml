name: Deploy to AWS EKS (kubectl)

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Deployment environment'
        options:
          - dev
          - prod
        required: true
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

env:
  AWS_REGION: us-east-1

jobs:
  deploy-eks:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name videostreamingplatform-${{ github.event.inputs.environment }}

      - name: Create or update namespace
        run: |
          kubectl create namespace videostreamingplatform --dry-run=client -o yaml | kubectl apply -f -

      - name: Save current image tags for rollback
        id: rollback-info
        run: |
          CURRENT_META=$(kubectl get deployment/metadata-service -n videostreamingplatform -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          CURRENT_DATA=$(kubectl get deployment/data-service -n videostreamingplatform -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "metadata_image=${CURRENT_META}" >> "$GITHUB_OUTPUT"
          echo "data_image=${CURRENT_DATA}" >> "$GITHUB_OUTPUT"
          echo "Current metadata image: ${CURRENT_META}"
          echo "Current data image: ${CURRENT_DATA}"

      - name: Deploy configmaps and secrets
        run: |
          # Apply namespace first
          kubectl apply -f k8s/aws/manifests/namespace.yaml

          # Create rds-credentials secret (values from Terraform or GitHub secrets)
          kubectl create secret generic rds-credentials \
            --namespace videostreamingplatform \
            --from-literal=host="${{ secrets.RDS_ENDPOINT }}" \
            --from-literal=username="admin" \
            --from-literal=password="${{ secrets.DATABASE_PASSWORD }}" \
            --from-literal=database="videoplatform" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Apply configmap with dynamic S3 bucket name
          export S3_BUCKET="${{ secrets.S3_VIDEOS_BUCKET }}"
          export AWS_REGION="${{ env.AWS_REGION }}"
          envsubst < k8s/aws/manifests/configmap.yaml | kubectl apply -f -

      - name: Deploy services
        run: |
          export IRSA_METADATA_ROLE_ARN="${{ secrets.IRSA_METADATA_ROLE_ARN }}"
          export IRSA_DATA_ROLE_ARN="${{ secrets.IRSA_DATA_ROLE_ARN }}"
          kubectl apply -f k8s/aws/manifests/services.yaml
          envsubst < k8s/aws/manifests/metadata-service-deploy.yaml | kubectl apply -f -
          envsubst < k8s/aws/manifests/data-service-deploy.yaml | kubectl apply -f -

      - name: Update image tags
        run: |
          kubectl set image deployment/metadata-service metadata-service=ghcr.io/${{ github.repository }}/metadata-service:${{ github.event.inputs.image_tag }} \
            -n videostreamingplatform
          kubectl set image deployment/data-service data-service=ghcr.io/${{ github.repository }}/data-service:${{ github.event.inputs.image_tag }} \
            -n videostreamingplatform

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/metadata-service -n videostreamingplatform --timeout=10m
          kubectl rollout status deployment/data-service -n videostreamingplatform --timeout=10m

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "⚠️ Deployment failed — rolling back to previous images"
          PREV_META="${{ steps.rollback-info.outputs.metadata_image }}"
          PREV_DATA="${{ steps.rollback-info.outputs.data_image }}"

          if [ "$PREV_META" != "none" ]; then
            kubectl set image deployment/metadata-service metadata-service="${PREV_META}" -n videostreamingplatform
            kubectl rollout status deployment/metadata-service -n videostreamingplatform --timeout=5m || true
          else
            kubectl rollout undo deployment/metadata-service -n videostreamingplatform || true
          fi

          if [ "$PREV_DATA" != "none" ]; then
            kubectl set image deployment/data-service data-service="${PREV_DATA}" -n videostreamingplatform
            kubectl rollout status deployment/data-service -n videostreamingplatform --timeout=5m || true
          else
            kubectl rollout undo deployment/data-service -n videostreamingplatform || true
          fi

          echo "✅ Rollback complete"
          kubectl get pods -n videostreamingplatform

      - name: Verify deployment
        run: |
          kubectl get pods -n videostreamingplatform
          kubectl get svc -n videostreamingplatform
          kubectl logs -l app=metadata-service -n videostreamingplatform --tail=20

      - name: Run smoke tests
        id: smoke
        run: |
          METADATA_LB=$(kubectl get svc metadata-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          DATA_LB=$(kubectl get svc data-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Testing metadata service at: ${METADATA_LB}"
          curl --fail --retry 3 --retry-delay 5 http://${METADATA_LB}:8080/health
          echo ""
          echo "Testing data service at: ${DATA_LB}"
          curl --fail --retry 3 --retry-delay 5 http://${DATA_LB}:8081/health

      - name: Run e2e tests
        if: success()
        run: |
          METADATA_LB=$(kubectl get svc metadata-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          DATA_LB=$(kubectl get svc data-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          export METADATA_SERVICE_URL="http://${METADATA_LB}:8080"
          export DATA_SERVICE_URL="http://${DATA_LB}:8081"
          go test -v -timeout 5m ./tests/e2e/...

      - name: Rollback on smoke/e2e failure
        if: failure() && (steps.smoke.outcome == 'failure')
        run: |
          echo "⚠️ Smoke/e2e tests failed — rolling back"
          kubectl rollout undo deployment/metadata-service -n videostreamingplatform || true
          kubectl rollout undo deployment/data-service -n videostreamingplatform || true
          kubectl rollout status deployment/metadata-service -n videostreamingplatform --timeout=5m || true
          kubectl rollout status deployment/data-service -n videostreamingplatform --timeout=5m || true
          echo "✅ Rollback complete"
