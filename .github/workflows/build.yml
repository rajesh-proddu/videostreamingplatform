name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'metadataservice/**'
      - 'dataservice/**'
      - 'utils/**'
      - 'build/docker/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push metadata service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/docker/metadataservice.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/metadata-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/metadata-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push data service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/docker/dataservice.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/data-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/data-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest metadata
        run: |
          echo "Metadata Service: ghcr.io/${{ github.repository }}/metadata-service:${{ github.sha }}"
          echo "Data Service: ghcr.io/${{ github.repository }}/data-service:${{ github.sha }}"
