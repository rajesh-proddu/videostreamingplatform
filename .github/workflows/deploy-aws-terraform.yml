name: Deploy to AWS EKS (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Deployment environment'
        options:
          - dev
          - prod
        required: true
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'
      destroy:
        type: boolean
        description: 'Destroy infrastructure (WARNING: This will delete resources)'
        required: false
        default: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.12.1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Init
        working-directory: k8s/aws/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
      
      - name: Terraform Plan
        working-directory: k8s/aws/terraform
        run: |
          terraform plan \
            -var-file="terraform.${{ github.event.inputs.environment }}.tfvars" \
            -var="container_image_tag=${{ github.event.inputs.image_tag }}" \
            -out=tfplan
      
      - name: Terraform Apply
        working-directory: k8s/aws/terraform
        if: github.event.inputs.destroy == 'false'
        run: |
          terraform apply -auto-approve tfplan
      
      - name: Terraform Destroy
        working-directory: k8s/aws/terraform
        if: github.event.inputs.destroy == 'true'
        run: |
          terraform destroy \
            -var-file="terraform.${{ github.event.inputs.environment }}.tfvars" \
            -var="container_image_tag=${{ github.event.inputs.image_tag }}" \
            -auto-approve
      
      - name: Get deployment info
        working-directory: k8s/aws/terraform
        if: github.event.inputs.destroy == 'false'
        id: tf-outputs
        run: |
          echo "=== Deployment Outputs ===" 
          EKS_NAME=$(terraform output -raw eks_cluster_name 2>/dev/null || echo "")
          EKS_ENDPOINT=$(terraform output -raw eks_cluster_endpoint 2>/dev/null || echo "")
          RDS_HOST=$(terraform output -raw rds_address 2>/dev/null || echo "")
          RDS_DB_NAME=$(terraform output -raw rds_database_name 2>/dev/null || echo "videoplatform")
          RDS_SECRET_ARN=$(terraform output -raw rds_master_user_secret_arn 2>/dev/null || echo "")
          S3_BUCKET=$(terraform output -raw s3_videos_bucket 2>/dev/null || echo "")
          IRSA_META_ARN=$(terraform output -raw metadata_service_irsa_role_arn 2>/dev/null || echo "")
          IRSA_DATA_ARN=$(terraform output -raw data_service_irsa_role_arn 2>/dev/null || echo "")
          echo "eks_name=${EKS_NAME}" >> "$GITHUB_OUTPUT"
          echo "rds_host=${RDS_HOST}" >> "$GITHUB_OUTPUT"
          echo "rds_db_name=${RDS_DB_NAME}" >> "$GITHUB_OUTPUT"
          echo "rds_secret_arn=${RDS_SECRET_ARN}" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=${S3_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "irsa_meta_arn=${IRSA_META_ARN}" >> "$GITHUB_OUTPUT"
          echo "irsa_data_arn=${IRSA_DATA_ARN}" >> "$GITHUB_OUTPUT"
          echo "Cluster: ${EKS_NAME}"
          echo "Endpoint: ${EKS_ENDPOINT}"
          echo "RDS Host: ${RDS_HOST}"
          echo "S3: ${S3_BUCKET}"

      - name: Configure K8s resources
        if: github.event.inputs.destroy == 'false'
        run: |
          CLUSTER_NAME="videostreamingplatform-${{ github.event.inputs.environment }}"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME

          # Create namespace
          kubectl apply -f k8s/aws/manifests/namespace.yaml

          # Fetch RDS master password from AWS-managed Secrets Manager secret
          RDS_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.tf-outputs.outputs.rds_secret_arn }}" \
            --query SecretString --output text | jq -r .password)

          # Create rds-credentials secret from Terraform outputs
          kubectl create secret generic rds-credentials \
            --namespace videostreamingplatform \
            --from-literal=host="${{ steps.tf-outputs.outputs.rds_host }}" \
            --from-literal=username="admin" \
            --from-literal=password="${RDS_PASSWORD}" \
            --from-literal=database="${{ steps.tf-outputs.outputs.rds_db_name }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Update ConfigMap with dynamic values
          export S3_BUCKET="${{ steps.tf-outputs.outputs.s3_bucket }}"
          export AWS_REGION="${{ env.AWS_REGION }}"
          export REDIS_ENDPOINT="${{ secrets.REDIS_ENDPOINT }}"
          OPENSEARCH_EP=$(terraform -chdir=k8s/aws/terraform output -raw opensearch_endpoint 2>/dev/null || echo "")
          export OPENSEARCH_ENDPOINT="${OPENSEARCH_EP}"
          envsubst < k8s/aws/manifests/configmap.yaml | kubectl apply -f -

          # Update deploy manifests with IRSA role ARNs
          export IRSA_METADATA_ROLE_ARN="${{ steps.tf-outputs.outputs.irsa_meta_arn }}"
          export IRSA_DATA_ROLE_ARN="${{ steps.tf-outputs.outputs.irsa_data_arn }}"
          envsubst < k8s/aws/manifests/metadata-service-deploy.yaml | kubectl apply -f -
          envsubst < k8s/aws/manifests/data-service-deploy.yaml | kubectl apply -f -
          kubectl apply -f k8s/aws/manifests/services.yaml

          # Deploy cdn-invalidator worker
          CDN_DIST_ID=$(terraform -chdir=k8s/aws/terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
          export CDN_INVALIDATOR_IMAGE="ghcr.io/${{ github.repository }}/cdn-invalidator:${{ github.event.inputs.image_tag }}"
          export CDN_DISTRIBUTION_ID="${CDN_DIST_ID}"
          export KAFKA_BROKERS="${{ secrets.KAFKA_BROKERS }}"
          envsubst < k8s/aws/manifests/cdn-invalidator-deploy.yaml | kubectl apply -f -

          # Deploy observability stack
          kubectl apply -f k8s/aws/manifests/observability/namespace.yaml
          kubectl apply -f k8s/aws/manifests/observability/prometheus.yaml
          kubectl apply -f k8s/aws/manifests/observability/jaeger.yaml
          kubectl apply -f k8s/aws/manifests/observability/grafana-dashboards-cm.yaml
          kubectl apply -f k8s/aws/manifests/observability/grafana.yaml

          # Initialize database schema (idempotent)
          kubectl run db-init --rm -i --restart=Never \
            --namespace videostreamingplatform \
            --image=mysql:8.0 \
            -- mysql -h "${{ steps.tf-outputs.outputs.rds_host }}" \
            -u admin -p"${RDS_PASSWORD}" \
            ${{ steps.tf-outputs.outputs.rds_db_name }} \
            -e "$(cat scripts/init-db.sql)" || true

      - name: Wait for services to be ready
        if: github.event.inputs.destroy == 'false'
        id: rollout
        run: |
          CLUSTER_NAME="videostreamingplatform-${{ github.event.inputs.environment }}"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          
          echo "Waiting for metadata-service to be ready..."
          kubectl rollout status deployment/metadata-service -n videostreamingplatform --timeout=10m
          
          echo "Waiting for data-service to be ready..."
          kubectl rollout status deployment/data-service -n videostreamingplatform --timeout=10m

      - name: Rollback on deployment failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "⚠️ Deployment failed — collecting diagnostics"
          CLUSTER_NAME="videostreamingplatform-${{ github.event.inputs.environment }}"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          echo "=== Pod Status ==="
          kubectl get pods -n videostreamingplatform -o wide || true
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n videostreamingplatform | tail -80 || true
          echo "=== Events ==="
          kubectl get events -n videostreamingplatform --sort-by='.lastTimestamp' | tail -30 || true
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods -n videostreamingplatform -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs $pod -n videostreamingplatform --tail=20 || true
          done
          echo "⚠️ Rolling back..."
          kubectl rollout undo deployment/metadata-service -n videostreamingplatform || true
          kubectl rollout undo deployment/data-service -n videostreamingplatform || true
          echo "✅ Rollback initiated"
      
      - name: Run smoke tests
        if: github.event.inputs.destroy == 'false'
        run: |
          CLUSTER_NAME="videostreamingplatform-${{ github.event.inputs.environment }}"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          
          echo "=== Pod Status ===" 
          kubectl get pods -n videostreamingplatform
          
          echo ""
          echo "=== Service Status ===" 
          kubectl get svc -n videostreamingplatform
          
          echo ""
          echo "=== Recent Logs ===" 
          kubectl logs -l app=metadata-service -n videostreamingplatform --tail=20 || true
          
          echo ""
          echo "=== Testing Metadata Service ===" 
          METADATA_LB=$(kubectl get svc metadata-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Metadata service endpoint: $METADATA_LB"
          curl --fail --retry 3 --retry-delay 5 http://$METADATA_LB:8080/health

      - name: Run e2e tests
        if: github.event.inputs.destroy == 'false'
        run: |
          CLUSTER_NAME="videostreamingplatform-${{ github.event.inputs.environment }}"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          METADATA_LB=$(kubectl get svc metadata-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          DATA_LB=$(kubectl get svc data-service -n videostreamingplatform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          export METADATA_SERVICE_URL="http://${METADATA_LB}:8080"
          export DATA_SERVICE_URL="http://${DATA_LB}:8081"
          go test -v -timeout 5m ./tests/e2e/...
      
      - name: Slack Notification - Success
        if: success() && github.event.inputs.destroy == 'false'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Deployment to ${{ github.event.inputs.environment }} successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\n✅ ${{ github.event.inputs.environment }} deployment successful\n*Image Tag:* ${{ github.event.inputs.image_tag }}"
                  }
                }
              ]
            }
      
      - name: Slack Notification - Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Deployment to ${{ github.event.inputs.environment }} failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\n❌ ${{ github.event.inputs.environment }} deployment failed\n*Image Tag:* ${{ github.event.inputs.image_tag }}\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

