# Scale-test override (NOT checked-in platform config). Raises the metadata
# service rate limiter so a 100k-scale produce attempt isn't capped at the dev
# default of 100000/min (~1667 req/s). Used only for tests/scale/event_pipeline.
#   docker compose -f docker-compose.yml -f docker-compose.scale-override.yml up -d ...
services:
  metadataservice:
    environment:
      RATE_LIMIT_PER_MIN: "600000000"
      RATE_LIMIT_BURST: "2000000"
      MYSQL_MAX_CONN: "64"
