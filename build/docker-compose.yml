version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: videostreamingplatform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: videouser
      MYSQL_PASSWORD: videopass
      MYSQL_DATABASE: videoplatform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./build/docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - videostreamingplatform
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 3s
      retries: 10
      interval: 5s

  localstack:
    image: localstack/localstack:latest
    container_name: videostreamingplatform-localstack
    environment:
      SERVICES: s3
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
    ports:
      - "4566:4566"
    volumes:
      - "${TMPDIR:-.}/.localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - videostreamingplatform
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      timeout: 3s
      retries: 10
      interval: 5s

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: videostreamingplatform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector HTTP
      - "14250:14250"  # Collector gRPC
    networks:
      - videostreamingplatform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14269"]
      timeout: 3s
      retries: 10
      interval: 5s

  prometheus:
    image: prom/prometheus:latest
    container_name: videostreamingplatform-prometheus
    volumes:
      - ./build/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - videostreamingplatform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      timeout: 3s
      retries: 10
      interval: 5s

  grafana:
    image: grafana/grafana:latest
    container_name: videostreamingplatform-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - videostreamingplatform
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      timeout: 3s
      retries: 10
      interval: 5s

  metadataservice:
    build:
      context: .
      dockerfile: build/docker/metadataservice.Dockerfile
    container_name: videostreamingplatform-metadataservice
    environment:
      ENVIRONMENT: dev
      LOG_LEVEL: info
      DEBUG_MODE: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: videouser
      MYSQL_PASSWORD: videopass
      MYSQL_DATABASE: videoplatform
      OTEL_ENABLED: "true"
      OTEL_JAEGER_URL: http://jaeger:14268/api/traces
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - videostreamingplatform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      timeout: 3s
      retries: 10
      interval: 5s

  dataservice:
    build:
      context: .
      dockerfile: build/docker/dataservice.Dockerfile
    container_name: videostreamingplatform-dataservice
    environment:
      ENVIRONMENT: dev
      LOG_LEVEL: info
      DEBUG_MODE: "true"
      S3_REGION: us-east-1
      S3_BUCKET: video-platform-storage
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      OTEL_ENABLED: "true"
      OTEL_JAEGER_URL: http://jaeger:14268/api/traces
    ports:
      - "8081:8081"
      - "50051:50051"
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - videostreamingplatform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      timeout: 3s
      retries: 10
      interval: 5s

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  videostreamingplatform:
    driver: bridge
